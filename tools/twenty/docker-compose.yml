# Docker Compose configuration for Twenty CRM
# This setup is optimized for self-hosting with dedicated PostgreSQL and Redis instances.
# Reference: docs/plans/fundraising-crm-twenty-prd.md

version: "3.8"

services:
  twenty-server:
    image: twentycrm/twenty:latest
    container_name: twenty-server
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - twenty-local-data:/app/packages/twenty-server/.local-storage
    environment:
      - PORT=3000
      - PG_DATABASE_URL=postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@twenty-postgres:${PG_DATABASE_PORT}/${PG_DATABASE_NAME}
      - SERVER_URL=${SERVER_URL}
      - FRONT_BASE_URL=${SERVER_URL}
      - REDIS_URL=redis://twenty-redis:6379
      - APP_SECRET=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STORAGE_TYPE=local
      - SIGN_UP_DISABLED=${SIGN_UP_DISABLED:-true}
    depends_on:
      twenty-postgres:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    restart: always

  twenty-worker:
    image: twentycrm/twenty:latest
    container_name: twenty-worker
    command: ["yarn", "worker:prod"]
    volumes:
      - twenty-local-data:/app/packages/twenty-server/.local-storage
    environment:
      - PG_DATABASE_URL=postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@twenty-postgres:${PG_DATABASE_PORT}/${PG_DATABASE_NAME}
      - SERVER_URL=${SERVER_URL}
      - FRONT_BASE_URL=${SERVER_URL}
      - REDIS_URL=redis://twenty-redis:6379
      - APP_SECRET=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STORAGE_TYPE=local
    depends_on:
      twenty-postgres:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    restart: always

  twenty-postgres:
    image: twentycrm/twenty-postgres:latest
    container_name: twenty-postgres
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${PG_DATABASE_USER}
      - POSTGRES_PASSWORD=${PG_DATABASE_PASSWORD}
      - POSTGRES_DB=${PG_DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER} -d ${PG_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  twenty-redis:
    image: redis:7-alpine
    container_name: twenty-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  twenty-local-data:
  twenty-db-data:
