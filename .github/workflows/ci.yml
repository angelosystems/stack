name: CI Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - tools/portfolio
          - tools/portfolio/master-kanban
          - tools/portfolio/adapters/solartown
          - tools/secrets-broker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download Go modules
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build Module
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

      - name: Test Module
        working-directory: ${{ matrix.module }}
        run: go test -v ./...

      - name: Go Vet (Lint)
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Go Fmt Check (Lint)
        working-directory: ${{ matrix.module }}
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Please run gofmt -w ."
            gofmt -d .
            exit 1
          fi
