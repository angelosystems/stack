<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>master-kanban (live)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .lane-stripe-stayawesome { border-left: 4px solid #06b6d4; }
  .lane-stripe-solartown   { border-left: 4px solid #f59e0b; }
  .lane-stripe-quantbot    { border-left: 4px solid #10b981; }
  .lane-stripe-mariobrain  { border-left: 4px solid #8b5cf6; }
  .lane-stripe-angeloos    { border-left: 4px solid #64748b; }
  .lane-stripe-stack       { border-left: 4px solid #f43f5e; }
  .col-now-overflow { box-shadow: inset 0 0 0 2px #ef4444; }
  .card-drag { cursor: grab; }
  .card-drag:active { cursor: grabbing; }
  .activity-spark { display:inline-block;width:36px;height:8px;background:linear-gradient(90deg,#e5e7eb 30%,#94a3b8 70%,#475569 100%);border-radius:2px;vertical-align:middle; }
  .activity-fresh { background: linear-gradient(90deg,#dcfce7 0%,#22c55e 100%); }
  .activity-stale { background: #f3f4f6; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body class="bg-slate-100 text-slate-900">

<div x-data="liveKanban()" x-init="init()" @keydown.escape.window="closeDetail()" class="min-h-screen">

  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-6 sticky top-0 z-10">
    <h1 class="text-lg font-semibold tracking-tight">master-kanban <span class="text-xs text-emerald-600 ml-1" x-text="apiOk ? '● live' : '○ offline'"></span></h1>

    <!-- View-Umschalter: Board | Pipeline | Backlog -->
    <nav class="flex gap-1 bg-slate-100 rounded-lg p-1">
      <template x-for="v in views" :key="v.id">
        <button @click="switchView(v.id)"
          :class="view === v.id ? 'bg-white shadow text-slate-900' : 'text-slate-500'"
          class="px-3 py-1 rounded-md text-sm font-medium">
          <span x-text="v.label"></span>
          <span x-show="v.id==='backlog' && backlog.length" class="ml-1 text-[10px] bg-amber-200 text-amber-900 rounded-full px-1.5" x-text="backlog.length"></span>
        </button>
      </template>
    </nav>

    <div class="flex gap-2 flex-1" x-show="view==='board'">
      <template x-for="f in firmas" :key="f.id">
        <button @click="toggleFirma(f.id)"
          :class="filter[f.id] ? 'bg-slate-900 text-white' : 'bg-white text-slate-600 border border-slate-300'"
          class="px-3 py-1 rounded-full text-sm font-medium hover:opacity-80">
          <span x-text="f.icon"></span>
          <span x-text="f.label"></span>
          <span class="opacity-60 text-xs ml-1" x-text="counts[f.id] || 0"></span>
        </button>
      </template>
    </div>
    <div class="flex-1" x-show="view!=='board'"></div>

    <div class="text-xs text-slate-500 flex gap-3 items-center">
      <span x-text="lastFetched"></span>
      <button @click="refresh()" class="px-2 py-1 border border-slate-300 rounded hover:bg-slate-100">↻</button>
    </div>
  </header>

  <main class="p-6 space-y-6">

    <!-- ════ BOARD-VIEW (Portfolio, wie gehabt + Plan-Baum pro Karte) ════ -->
    <template x-if="view==='board'">
      <div class="space-y-6">
        <template x-for="f in firmas" :key="f.id">
          <section x-show="filter[f.id]" :class="'lane-stripe-' + f.id" class="bg-white rounded-lg shadow-sm">
            <header class="px-5 py-3 flex items-center justify-between border-b border-slate-200">
              <div class="flex items-center gap-3">
                <span class="text-xl" x-text="f.icon"></span>
                <h2 class="font-semibold uppercase tracking-wide text-sm" x-text="f.label"></h2>
                <span class="text-xs text-slate-400" x-text="(counts[f.id]||0) + ' total'"></span>
                <span class="text-xs font-medium text-emerald-600 ml-4" x-show="capacity[f.id]" x-text="'🟢 ' + capacity[f.id].polecats + ' Polecats frei · ' + capacity[f.id].vkslots + ' vk-Slots'"></span>
              </div>
              <div class="text-xs text-slate-500">
                now: <span x-text="nowCount(f.id)"></span> / <span x-text="f.wip"></span>
                <span x-show="nowCount(f.id) > f.wip" class="ml-2 text-red-600 font-semibold">WIP überschritten</span>
              </div>
            </header>
            <div class="grid grid-cols-5 divide-x divide-slate-200">
              <template x-for="stage in stages" :key="stage">
                <div class="p-3 min-h-[120px]"
                  :class="stage === 'now' && nowCount(f.id) > f.wip ? 'col-now-overflow' : ''"
                  :data-firma="f.id" :data-stage="stage"
                  x-init="$nextTick(() => initSortable($el))">
                  <div class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 flex items-center justify-between">
                    <span x-text="stageLabel[stage]"></span>
                    <span class="text-slate-400 font-normal" x-text="cardsIn(f.id, stage).length"></span>
                  </div>
                  <template x-for="c in cardsIn(f.id, stage)" :key="c.id">
                    <article :data-id="c.id" @click="openDetail(c.id)"
                      class="card-drag mb-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-md p-2 text-sm shadow-sm">
                      <div class="font-medium leading-snug" x-text="c.title"></div>
                      <div class="text-xs text-slate-500 mt-1 flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] text-slate-400" x-text="c.id"></span>
                        <span x-show="c.bead_count > 0" :title="c.bead_count + ' beads'">🐝<span class="text-[10px] ml-0.5" x-text="c.bead_count"></span></span>
                        <span x-show="c.vk_count > 0" :title="c.vk_count + ' vk-workspaces'">🔧<span class="text-[10px] ml-0.5" x-text="c.vk_count"></span></span>
                        <span x-show="c.pr_count > 0" :title="c.pr_count + ' PRs'">📦<span class="text-[10px] ml-0.5" x-text="c.pr_count"></span></span>
                        <button x-show="c.plan_count > 0" @click.stop="toggleTree(c.id)"
                          class="text-[11px] px-1 rounded border border-slate-300 hover:bg-white"
                          :title="c.plan_count + ' plan-files — Baum auf/zu'">
                          📄<span class="ml-0.5" x-text="c.plan_count"></span>
                          <span x-text="expanded[c.id] ? '▾' : '▸'"></span>
                        </button>
                        <span class="activity-spark" :class="freshClass(c.last_activity)" :title="'last activity: ' + (c.last_activity || '—')"></span>
                      </div>
                      <!-- Plan-Hierarchie: Vision ▸ Phasen ▸ PRDs (P4.1/P4.2) -->
                      <div x-show="expanded[c.id]" class="mt-2 pt-2 border-t border-slate-200 space-y-0.5" @click.stop>
                        <template x-for="it in treeOf(c.id)" :key="it.id">
                          <div class="flex items-center gap-1.5 text-xs" :style="'padding-left:' + (it.depth*14) + 'px'">
                            <span x-text="layerIcon(it.layer)" :title="it.layer || 'plan'"></span>
                            <a :href="'/review?id=' + it.id" class="hover:underline text-slate-700 truncate" :title="'Review-Workbench öffnen'" x-text="it.title"></a>
                            <span class="px-1 rounded text-[10px]" :class="statusChip(it.status)" x-text="it.status || '—'"></span>
                            <span x-show="rollup[it.slug]" class="text-[10px] text-slate-500"
                              :title="'Beads: closed/total'">🐝<span x-text="rollup[it.slug] ? rollup[it.slug].closed + '/' + rollup[it.slug].total : ''"></span></span>
                          </div>
                        </template>
                        <div x-show="!treeOf(c.id).length" class="text-[11px] text-slate-400">lade…</div>
                      </div>
                    </article>
                  </template>
                </div>
              </template>
            </div>
          </section>
        </template>
      </div>
    </template>

    <!-- ════ PIPELINE-VIEW (das Planungs-Kanban: Spalten = Plan-Status) ════ -->
    <template x-if="view==='pipeline'">
      <section class="bg-white rounded-lg shadow-sm">
        <header class="px-5 py-3 border-b border-slate-200 flex items-center gap-3">
          <h2 class="font-semibold uppercase tracking-wide text-sm">Plan-Pipeline</h2>
          <span class="text-xs text-slate-400">Spalten = Frontmatter-Status · Karten = Wurzel-Pläne mit Unterbaum</span>
        </header>
        <div class="grid grid-cols-5 divide-x divide-slate-200">
          <template x-for="col in planCols" :key="col.id">
            <div class="p-3 min-h-[160px]">
              <div class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 flex justify-between">
                <span x-text="col.label"></span>
                <span class="text-slate-400 font-normal" x-text="rootsIn(col.id).length"></span>
              </div>
              <template x-for="it in rootsIn(col.id)" :key="it.id">
                <article class="mb-2 bg-slate-50 border border-slate-200 rounded-md p-2 text-sm"
                  :class="'lane-stripe-' + firmaOf(it)">
                  <a :href="'/review?id=' + it.id" class="font-medium leading-snug hover:underline" title="Review-Workbench öffnen" x-text="it.title"></a>
                  <div class="text-[10px] text-slate-400 mt-1 flex gap-2">
                    <span x-text="layerIcon(it.layer) + ' ' + (it.layer||'plan')"></span>
                    <span x-show="childCount(it.id)" x-text="'▸ ' + childCount(it.id) + ' Unterpläne'"></span>
                    <span x-show="rollup[it.slug]" x-text="rollup[it.slug] ? '🐝 ' + rollup[it.slug].closed + '/' + rollup[it.slug].total : ''"></span>
                  </div>
                  <div class="mt-1 space-y-0.5">
                    <template x-for="ch in childrenOf(it.id)" :key="ch.id">
                      <div class="flex items-center gap-1 text-[11px] text-slate-600 pl-2">
                        <span x-text="layerIcon(ch.layer)"></span>
                        <a :href="'/review?id=' + ch.id" class="hover:underline truncate" x-text="ch.title"></a>
                        <span class="px-1 rounded text-[9px]" :class="statusChip(ch.status)" x-text="ch.status"></span>
                      </div>
                    </template>
                  </div>
                </article>
              </template>
            </div>
          </template>
        </div>
      </section>
    </template>

    <!-- ════ BACKLOG-VIEW (lane-lose Beads + Triage, P2.3) ════ -->
    <template x-if="view==='backlog'">
      <section class="bg-white rounded-lg shadow-sm">
        <header class="px-5 py-3 border-b border-slate-200 flex items-center gap-3">
          <h2 class="font-semibold uppercase tracking-wide text-sm">Backlog</h2>
          <span class="text-xs text-slate-400">offene Beads ohne lane:*-Label · Triage routet in Hacker- oder Plan-Lane</span>
          <select x-model="backlogRig" @change="loadBacklog()" class="ml-auto text-xs border border-slate-300 rounded px-2 py-1">
            <option value="">alle rigs</option>
            <option value="clean">clean</option>
            <option value="testrig">testrig</option>
            <option value="quantumshift">quantumshift</option>
            <option value="stack">stack</option>
            <option value="stayawesomeOS">stayawesomeOS</option>
          </select>
        </header>
        <ul class="divide-y divide-slate-100">
          <template x-for="b in backlogFiltered" :key="b.id">
            <li class="px-5 py-2 flex items-center gap-3 text-sm hover:bg-slate-50">
              <span class="text-[10px] text-slate-400 w-20 shrink-0" x-text="b.id"></span>
              <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-200 text-slate-600 shrink-0" x-text="b.rig"></span>
              <span class="flex-1 truncate" x-text="b.title"></span>
              <span class="text-[10px] text-slate-400 shrink-0" x-text="ageOf(b.created_at)"></span>
              <button @click="triage(b, 'hacker')" class="shrink-0 text-xs px-2 py-1 rounded bg-amber-100 hover:bg-amber-200 text-amber-900">→ Hacker</button>
              <button @click="triage(b, 'plan')" class="shrink-0 text-xs px-2 py-1 rounded bg-sky-100 hover:bg-sky-200 text-sky-900">→ Plan</button>
            </li>
          </template>
        </ul>
        <div x-show="!backlogFiltered.length" class="px-5 py-8 text-center text-sm text-slate-400">Backlog leer 🎉</div>
      </section>
    </template>

    <footer class="text-xs text-slate-500 pt-4 pb-12">
      Master-Kanban LIVE · Board = Portfolio · Pipeline = Plan-Status (git-Frontmatter) · Backlog = Beads ohne Lane ·
      SoT: git + solartown_clean — dieses Board ist reine Projektion
    </footer>
  </main>

  <!-- ════ KARTEN-DETAIL: Side-Peek im Notion-Stil (P5) ════ -->
  <div x-show="detailOpen" x-cloak x-transition.opacity.duration.150ms
    class="fixed inset-0 bg-slate-900/20 z-30" @click="closeDetail()"></div>

  <aside x-show="detailOpen" x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
    :class="detailExpanded ? 'w-[min(1100px,94vw)]' : 'w-[clamp(400px,40vw,560px)]'"
    class="fixed right-0 top-0 h-full bg-white shadow-2xl z-40 flex flex-col transition-[width] duration-200">

    <!-- Kopfleiste: aus-/einklappen · Link kopieren · schließen -->
    <div class="flex items-center gap-1 px-3 py-2 border-b border-slate-200 shrink-0">
      <button @click="detailExpanded = !detailExpanded"
        class="p-1.5 rounded hover:bg-slate-100 text-slate-500 font-mono text-sm w-8"
        :title="detailExpanded ? 'einklappen' : 'ausklappen'" x-text="detailExpanded ? '»' : '«'"></button>
      <button @click="copyDetailLink()" class="p-1.5 rounded hover:bg-slate-100 text-slate-500 text-sm"
        :title="copied ? 'kopiert' : 'Link kopieren'" x-text="copied ? '✓' : '🔗'"></button>
      <span class="text-xs text-slate-400 ml-2 font-mono truncate" x-text="detail ? detail.initiative.id : ''"></span>
      <button @click="closeDetail()" class="ml-auto p-1.5 rounded hover:bg-slate-100 text-slate-500" title="schließen (Esc)">✕</button>
    </div>

    <div class="overflow-y-auto flex-1 px-6 py-5">
      <div x-show="!detail" class="text-sm text-slate-400">lade…</div>
      <template x-if="detail">
        <div class="space-y-6" :class="detailExpanded ? 'max-w-3xl mx-auto' : ''">

          <!-- Titel + Stage -->
          <div>
            <div class="flex items-start gap-2">
              <span class="text-2xl leading-tight" x-text="(firmas.find(f => f.id === detail.initiative.firma) || {icon:'▣'}).icon"></span>
              <h2 class="text-2xl font-semibold leading-tight" x-text="detail.initiative.title"></h2>
            </div>
            <div class="mt-2 flex items-center gap-2 text-xs">
              <span class="px-2 py-0.5 rounded-full font-medium" :class="stageChipCls(detail.initiative.stage)"
                x-text="stageLabel[detail.initiative.stage] || detail.initiative.stage"></span>
              <span class="text-slate-400" x-text="(firmas.find(f => f.id === detail.initiative.firma) || {label: detail.initiative.firma}).label"></span>
            </div>
          </div>

          <!-- Eigenschaften (Notion-Property-Block) -->
          <dl class="grid grid-cols-[130px_1fr] gap-y-1.5 text-sm">
            <dt class="text-slate-400">Backend</dt>
            <dd x-text="detail.initiative.primary_backend || '—'"></dd>
            <dt class="text-slate-400">Angelegt</dt>
            <dd x-text="fmtDate(detail.initiative.created_at)"></dd>
            <dt class="text-slate-400">Aktualisiert</dt>
            <dd x-text="fmtDate(detail.initiative.updated_at)"></dd>
            <dt class="text-slate-400">Letzte Aktivität</dt>
            <dd x-text="fmtRel(detail.initiative.last_activity)"></dd>
            <dt class="text-slate-400">Umfang</dt>
            <dd class="flex gap-3">
              <span x-show="detail.initiative.bead_count">🐝 <span x-text="detail.initiative.bead_count"></span></span>
              <span x-show="detail.initiative.vk_count">🔧 <span x-text="detail.initiative.vk_count"></span></span>
              <span x-show="detail.initiative.pr_count">📦 <span x-text="detail.initiative.pr_count"></span></span>
              <span x-show="detail.initiative.plan_count">📄 <span x-text="detail.initiative.plan_count"></span></span>
              <span x-show="!detail.initiative.bead_count && !detail.initiative.vk_count && !detail.initiative.pr_count && !detail.initiative.plan_count" class="text-slate-400">—</span>
            </dd>
          </dl>

          <!-- Pläne (aus plan_item, verlinkt in die Review-Workbench) -->
          <section x-show="detail.initiative.plan_count > 0">
            <h3 class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 border-b border-slate-100 pb-1">Pläne</h3>
            <div class="space-y-1">
              <template x-for="it in treeOf(detail.initiative.id)" :key="'d-' + it.id">
                <div class="flex items-center gap-1.5 text-sm" :style="'padding-left:' + (it.depth*16) + 'px'">
                  <span x-text="layerIcon(it.layer)" :title="it.layer || 'plan'"></span>
                  <a :href="'/review?id=' + it.id" class="hover:underline text-slate-700 truncate" title="Review-Workbench öffnen" x-text="it.title"></a>
                  <span class="px-1 rounded text-[10px] shrink-0" :class="statusChip(it.status)" x-text="it.status || '—'"></span>
                  <span x-show="rollup[it.slug]" class="text-[10px] text-slate-500 shrink-0"
                    :title="'Beads: closed/total'">🐝<span x-text="rollup[it.slug] ? rollup[it.slug].closed + '/' + rollup[it.slug].total : ''"></span></span>
                </div>
              </template>
              <div x-show="!treeOf(detail.initiative.id).length" class="text-sm text-slate-400">lade…</div>
            </div>
          </section>

          <!-- Verknüpfungen (Beads, VK-Workspaces, PRs) -->
          <section x-show="detailLinks().length">
            <h3 class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 border-b border-slate-100 pb-1">Verknüpfungen</h3>
            <div class="space-y-1">
              <template x-for="(l, li) in detailLinks()" :key="'l-' + li">
                <div class="flex items-center gap-2 text-sm">
                  <span x-text="{bead:'🐝', vk_workspace:'🔧', github_pr:'📦'}[l.kind] || '🔗'"></span>
                  <template x-if="l.kind === 'github_pr'">
                    <a :href="prUrl(l.ref)" target="_blank" rel="noopener" class="hover:underline text-sky-700 truncate" x-text="l.ref + ' ↗'"></a>
                  </template>
                  <template x-if="l.kind !== 'github_pr'">
                    <span class="font-mono text-xs text-slate-600 truncate" x-text="l.ref"></span>
                  </template>
                  <span class="text-[10px] text-slate-400 ml-auto shrink-0" x-text="fmtDate(l.added_at)"></span>
                </div>
              </template>
            </div>
          </section>

          <!-- Historie (initiative_event, neueste zuerst) -->
          <section>
            <h3 class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 border-b border-slate-100 pb-1">
              Historie <span class="font-normal text-slate-400" x-text="'(' + detail.events.length + (detail.events.length === 40 ? '+' : '') + ')'"></span>
            </h3>
            <ol class="space-y-2.5">
              <template x-for="(e, ei) in detail.events" :key="'e-' + ei">
                <li class="flex gap-2 text-sm">
                  <span class="shrink-0 w-5 text-center" x-text="eventIcon(e.kind)"></span>
                  <div class="flex-1 min-w-0">
                    <div class="leading-snug break-words" x-text="eventText(e)"></div>
                    <div class="text-[11px] text-slate-400">
                      <span x-text="e.source_backend"></span><span x-show="e.actor"> · <span x-text="e.actor"></span></span> · <span x-text="fmtDateTime(e.at)"></span>
                    </div>
                  </div>
                </li>
              </template>
            </ol>
            <div x-show="!detail.events.length" class="text-sm text-slate-400">Noch keine Events.</div>
          </section>

        </div>
      </template>
    </div>
  </aside>
</div>

<script>
function liveKanban() {
  return {
    apiBase: location.origin.includes('7780') ? location.origin : location.origin,
    apiOk: false,
    view: 'board',
    views: [
      { id: 'board',    label: 'Board' },
      { id: 'pipeline', label: 'Pipeline' },
      { id: 'backlog',  label: 'Backlog' },
    ],
    firmas: [
      { id: 'stayawesome', label: 'Stay Awesome', icon: '🏨', wip: 4 },
      { id: 'solartown',   label: 'Solartown',    icon: '⚡', wip: 6 },
      { id: 'quantbot',    label: 'QuantBot',     icon: '💰', wip: 4 },
      { id: 'mariobrain',  label: 'mario-brain',  icon: '🧠', wip: 4 },
      { id: 'stack',       label: 'Stack (Plattform)', icon: '🧱', wip: 4 },
      { id: 'angeloos',    label: 'AngeloOS',     icon: '⚙',  wip: 4 },
    ],
    prefixFirma: { sa: 'stayawesome', st: 'solartown', qb: 'quantbot', mb: 'mariobrain', ag: 'stack', sk: 'stack' },
    ghRepos: {
      '/root/solartown': 'angelosystems/solartown',
      '/opt/quantbot': 'angelosystems/quantbot',
      '/opt/stack': 'angelosystems/stack',
      '/root/stayawesomeOS': 'angelosystems/stayawesomeOS',
      '/root/mario-brain': 'angelosystems/mario-brain',
    },
    stages: ['idea', 'now', 'soon', 'watching', 'done'],
    stageLabel: { idea: 'Idea', now: 'Now', soon: 'Soon', watching: 'Watching', done: 'Done' },
    planCols: [
      { id: 'draft',       label: 'Draft' },
      { id: 'review',      label: 'In Review' },
      { id: 'approved',    label: 'Approved' },
      { id: 'in-progress', label: 'In Progress' },
      { id: 'done',        label: 'Done' },
    ],
    filter: { stayawesome: true, solartown: true, quantbot: true, mariobrain: true, angeloos: true, stack: true },
    cards: [],
    allPlans: [],
    plansCache: {},
    expanded: {},
    backlog: [],
    backlogRig: '',
    lastFetched: '',

    detail: null,
    detailOpen: false,
    detailExpanded: false,
    copied: false,
    dragging: false,

    rollup: {},
    capacity: {},
    async init() {
      await this.refresh();
      this.loadRollup();
      this.loadCapacity();
      setInterval(() => { this.refresh(true); this.loadCapacity(); }, 30000);
      // Deep-Link: #<initiative-id> öffnet Karte + Baum
      const h = location.hash.slice(1);
      if (h) this.$nextTick(async () => {
        const el = document.querySelector('[data-id="' + h + '"]');
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('ring-2', 'ring-sky-400'); }
        await this.openDetail(h);
      });
    },

    // ── Karten-Detail: Side-Peek (P5) ──
    async openDetail(id) {
      if (this.dragging) return; // Klick direkt nach Drag-Drop nicht als Öffnen werten
      this.detailOpen = true;
      this.copied = false;
      if (!this.detail || this.detail.initiative.id !== id) this.detail = null;
      history.replaceState(null, '', location.pathname + '#' + id);
      try {
        const r = await fetch(this.apiBase + '/api/initiative?id=' + encodeURIComponent(id));
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.detail = await r.json();
        if (this.detail.initiative.plan_count > 0 && !this.plansCache[id]) {
          const pr = await fetch(this.apiBase + '/api/plans?initiative=' + encodeURIComponent(id));
          this.plansCache[id] = pr.ok ? await pr.json() : [];
        }
      } catch (e) {
        this.detailOpen = false;
        this.lastFetched = 'detail miss: ' + e.message;
      }
    },
    closeDetail() {
      if (!this.detailOpen) return;
      this.detailOpen = false;
      this.detailExpanded = false;
      history.replaceState(null, '', location.pathname);
    },
    copyDetailLink() {
      if (!this.detail) return;
      navigator.clipboard.writeText(location.origin + location.pathname + '#' + this.detail.initiative.id);
      this.copied = true;
      setTimeout(() => this.copied = false, 1500);
    },
    detailLinks() { return ((this.detail && this.detail.links) || []).filter(l => l.kind !== 'plan_file'); },
    prUrl(ref) { const m = ref.match(/^(.+)#(\d+)$/); return m ? 'https://github.com/' + m[1] + '/pull/' + m[2] : '#'; },
    stageChipCls(s) {
      return {
        idea: 'bg-slate-100 text-slate-600', now: 'bg-red-100 text-red-700',
        soon: 'bg-sky-100 text-sky-700', watching: 'bg-amber-100 text-amber-800',
        done: 'bg-emerald-100 text-emerald-800',
      }[s] || 'bg-slate-100 text-slate-600';
    },
    eventIcon(k) {
      return { created: '✨', moved: '➜', edited: '✏️', linked: '🔗', unlinked: '✂️',
               activity: '⚡', stage_proposed: '💡', completed: '✅' }[k] || '•';
    },
    eventText(e) {
      const p = e.payload || {};
      const ref = p.title || p.ref || p.slug || '';
      switch (e.kind) {
        case 'created': return 'Angelegt' + (ref ? ': ' + ref : '');
        case 'moved': return 'Verschoben ' + (e.from_stage || '?') + ' → ' + (e.to_stage || '?');
        case 'linked': return 'Verknüpft: ' + (p.kind ? p.kind + ' ' : '') + (p.ref || ref);
        case 'unlinked': return 'Verknüpfung entfernt: ' + (p.ref || ref);
        case 'activity': return 'Aktivität' + (ref ? ': ' + ref : '');
        case 'completed': return 'Abgeschlossen' + (ref ? ': ' + ref : '');
        case 'stage_proposed': return 'Stage-Vorschlag: ' + (e.to_stage || p.stage || '?');
        case 'edited': return 'Bearbeitet' + (ref ? ': ' + ref : '');
        default: return e.kind + (ref ? ': ' + ref : '');
      }
    },
    fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString('de-DE', { year: 'numeric', month: '2-digit', day: '2-digit' }) : '—'; },
    fmtDateTime(ts) { return ts ? new Date(ts).toLocaleString('de-DE', { dateStyle: 'medium', timeStyle: 'short' }) : '—'; },
    fmtRel(ts) {
      if (!ts) return '—';
      const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
      if (m < 60) return 'vor ' + m + ' min';
      if (m < 1440) return 'vor ' + Math.floor(m / 60) + ' h';
      return 'vor ' + Math.floor(m / 1440) + ' d';
    },
    async loadRollup() {
      const r = await fetch(this.apiBase + '/api/rollup');
      if (r.ok) { const arr = await r.json(); this.rollup = Object.fromEntries(arr.map(x => [x.slug, x])); }
    },
    async loadCapacity() {
      try {
        const r = await fetch(this.apiBase + '/api/capacity');
        if (r.ok) this.capacity = await r.json();
      } catch (e) { console.error('capacity fetch:', e); }
    },

    async refresh(silent) {
      try {
        const r = await fetch(this.apiBase + '/api/initiatives');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.cards = await r.json();
        this.apiOk = true;
        if (this.view === 'pipeline') await this.loadAllPlans();
        if (this.view === 'backlog') await this.loadBacklog();
        const t = new Date().toLocaleTimeString('de-DE');
        this.lastFetched = (silent ? 'auto-refresh' : 'geladen') + ' ' + t;
      } catch (e) {
        this.apiOk = false;
        this.lastFetched = 'fetch miss: ' + e.message;
      }
    },

    async switchView(v) {
      this.view = v;
      if (v === 'pipeline') await this.loadAllPlans();
      if (v === 'backlog') await this.loadBacklog();
    },

    // ── Plan-Baum (P4.1) ──
    async toggleTree(id) {
      this.expanded[id] = !this.expanded[id];
      if (this.expanded[id] && !this.plansCache[id]) {
        const r = await fetch(this.apiBase + '/api/plans?initiative=' + encodeURIComponent(id));
        this.plansCache[id] = r.ok ? await r.json() : [];
      }
    },
    treeOf(id) {
      const items = this.plansCache[id] || [];
      const byParent = {};
      items.forEach(i => { const k = i.parent_id || 'ROOT'; (byParent[k] = byParent[k] || []).push(i); });
      const out = [], seen = new Set();
      const walk = (pid, depth) => (byParent[pid] || []).forEach(i => {
        if (seen.has(i.id)) return;
        seen.add(i.id); out.push({ ...i, depth }); walk(i.id, depth + 1);
      });
      walk('ROOT', 0);
      items.forEach(i => { if (!seen.has(i.id)) out.push({ ...i, depth: 0 }); });
      return out;
    },
    layerIcon(l) { return { vision: '🌅', roadmap: '🗺️', prd: '📋', epic: '🧱', implementation: '🔧', session: '📝' }[l] || '📄'; },
    statusChip(s) {
      if (!s) return 'bg-slate-100 text-slate-500';
      if (s.startsWith('approved')) return 'bg-emerald-100 text-emerald-800';
      if (s === 'review') return 'bg-amber-100 text-amber-800';
      if (s === 'in-progress') return 'bg-sky-100 text-sky-800';
      if (s === 'done') return 'bg-slate-200 text-slate-500';
      return 'bg-slate-100 text-slate-600';
    },
    ghUrl(it) {
      const gh = this.ghRepos[it.repo];
      if (!gh) return '#';
      return 'https://github.com/' + gh + '/blob/main/' + it.path.slice(it.repo.length + 1);
    },

    // ── Pipeline-View (P4.2) ──
    async loadAllPlans() {
      const r = await fetch(this.apiBase + '/api/plans');
      this.allPlans = r.ok ? await r.json() : [];
    },
    statusCol(s) {
      if (!s) return 'draft';
      if (s.startsWith('approved')) return 'approved';
      if (['draft', 'review', 'in-progress', 'done'].includes(s)) return s;
      return 'draft';
    },
    rootsIn(col) { return this.allPlans.filter(i => !i.parent_id && this.statusCol(i.status) === col); },
    childrenOf(id) { return this.allPlans.filter(i => i.parent_id === id); },
    childCount(id) { return this.childrenOf(id).length; },
    firmaOf(it) { return this.prefixFirma[(it.id || '').split('-')[0]] || 'angeloos'; },

    // ── Backlog + Triage (P2.3) ──
    async loadBacklog() {
      const r = await fetch(this.apiBase + '/api/backlog?limit=100');
      this.backlog = r.ok ? await r.json() : [];
    },
    get backlogFiltered() { return this.backlog.filter(b => !this.backlogRig || b.rig === this.backlogRig); },
    ageOf(ts) {
      const d = Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
      return d === 0 ? 'heute' : d + 'd';
    },
    async triage(b, lane) {
      try {
        const r = await fetch(this.apiBase + '/api/triage', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: b.id, lane }),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.backlog = this.backlog.filter(x => x.id !== b.id);
      } catch (e) { alert('triage miss: ' + e.message); }
    },

    // ── Board (unverändert) ──
    toggleFirma(id) { this.filter[id] = !this.filter[id]; },
    cardsIn(firma, stage) { return this.cards.filter(c => c.firma === firma && c.stage === stage); },
    nowCount(firma) { return this.cardsIn(firma, 'now').length; },
    get counts() { const o = {}; this.firmas.forEach(f => o[f.id] = this.cards.filter(c => c.firma === f.id).length); return o; },
    freshClass(la) {
      if (!la) return 'activity-stale';
      const days = (Date.now() - new Date(la).getTime()) / 86400000;
      return days < 2 ? 'activity-fresh' : days > 14 ? 'activity-stale' : '';
    },
    initSortable(el) {
      const self = this;
      Sortable.create(el, {
        group: 'kanban-' + el.dataset.firma,
        animation: 150,
        ghostClass: 'opacity-30',
        onStart() { self.dragging = true; },
        async onEnd(evt) {
          setTimeout(() => self.dragging = false, 0); // Click-Event nach Drop verpufft
          const id = evt.item.dataset.id;
          const newStage = evt.to.dataset.stage;
          try {
            const r = await fetch(self.apiBase + '/api/move', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id, stage: newStage }),
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const c = self.cards.find(x => x.id === id);
            if (c) c.stage = newStage;
          } catch (e) {
            alert('move miss: ' + e.message);
            self.refresh();
          }
        },
      });
    },
  };
}
</script>
